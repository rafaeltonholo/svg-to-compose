# Triggers the homebrew formula and scoop manifest updates when a new release is published.
name: Publish Package Manager Formulas

on:
  release:
    types:
      - published
    workflow_dispatch:
      inputs:
        version:
          description: "Version to dispatch (e.g., 2.1.3)"
          required: true
          type: string

jobs:
  trigger-homebrew-update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew formula update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            https://api.github.com/repos/dev-tonholo/homebrew-svg-to-compose/dispatches \
            -d '{"event_type": "formula-update", "client_payload": {"version": "${{ github.event.release.tag_name || inputs.version }}"}}'

  trigger-scoop-update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Scoop manifest update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SCOOP_BUCKET_TOKEN }}" \
            https://api.github.com/repos/dev-tonholo/scoop-svg-to-compose/dispatches \
            -d '{"event_type": "manifest-update", "client_payload": {"version": "${{ github.event.release.tag_name || inputs.version }}"}}'
