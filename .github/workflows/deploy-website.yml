name: Deploy Website to Pages

on:
  push:
    tags:
      - "*.*.*"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    outputs:
      last-modified: ${{ steps.last-modified.outputs.date }}
    defaults:
      run:
        shell: bash

    env:
      KOBWEB_CLI_VERSION: 0.9.21

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4

      - name: Query Browser Cache ID
        id: browser-cache-id
        run: echo "value=$(cd website && ./gradlew -q :site:kobwebBrowserCacheId)" >> $GITHUB_OUTPUT

      - name: Cache Browser Dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.browser-cache-id.outputs.value }}

      - name: Fetch Kobweb CLI
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          repository: "varabyte/kobweb-cli"
          tag: "v${{ env.KOBWEB_CLI_VERSION }}"
          fileName: "kobweb-${{ env.KOBWEB_CLI_VERSION }}.zip"
          tarBall: false
          zipBall: false

      - name: Unzip Kobweb CLI
        run: unzip kobweb-${{ env.KOBWEB_CLI_VERSION }}.zip

      - name: Generate API documentation
        run: ./gradlew :docs:dokkaGenerate

      - name: Update sitemap last-modified
        id: last-modified
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "date=$TODAY" >> "$GITHUB_OUTPUT"
          sed -i "s/^LAST_MODIFIED=.*/LAST_MODIFIED=$TODAY/" app.properties
          cd website && ./gradlew :site:generateSitemap

      - name: Export site
        run: |
          cd website/site
          ../../kobweb-${{ env.KOBWEB_CLI_VERSION }}/bin/kobweb export --notty --layout static

      - name: Create fallback 404 page
        run: cp website/site/.kobweb/site/index.html website/site/.kobweb/site/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: website/site/.kobweb/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: export
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  update-last-modified:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [deploy, export]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Configure bot
        uses: ./.github/actions/configure-bot
        with:
          app-id: ${{ secrets.S2C_BOT_APP_ID }}

      - name: Commit LAST_MODIFIED update
        env:
          LAST_MODIFIED: ${{ needs.export.outputs.last-modified }}
        run: |
          sed -i "s/^LAST_MODIFIED=.*/LAST_MODIFIED=$LAST_MODIFIED/" app.properties
          if git diff --quiet app.properties; then
            echo "LAST_MODIFIED already up to date, skipping commit."
          else
            git add app.properties
            git commit -m "chore: update LAST_MODIFIED to $LAST_MODIFIED"
            git push origin main
          fi
