name: Pull request check
on: pull_request
jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
        - name: Checkout the repo
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        - name: Prepares environment for building
          uses: ./.github/actions/setup

        - name: Cache Kotlin Konan
          id: cache-kotlin-konan
          uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
          with:
            path: |
              ~/.konan/**/*
            key: kotlin-konan-${{ matrix.os }}

        - name: Build Native Binary for macos
          if: matrix.os == 'macos-latest'
          uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3
          with:
            gradle-version: wrapper
            job-id: ${{ matrix.os }}
            arguments: -p modules/cli releaseMacOS

        - name: Build Native Binary for Windows
          if: matrix.os == 'windows-latest'
          uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3
          with:
            gradle-version: wrapper
            job-id: ${{ matrix.os }}
            arguments: -p modules/cli releaseWindows

        - name: Build Native Binary for Linux
          if: matrix.os == 'ubuntu-latest'
          uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3
          with:
            gradle-version: wrapper
            job-id: ${{ matrix.os }}
            arguments: -p modules/cli releaseLinux

        - name: Running Detekt
          shell: bash
          run: |
              ./gradlew detekt

        - name: Verify unit tests
          shell: bash
          run: |
            ./gradlew cleanAllTests allTests
          continue-on-error: false

        - name: Upload native binary
          uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
          with:
            name: native-binary-${{ matrix.os }}
            path: modules/cli/build/bin/
            retention-days: 1

  integrity-checks:
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]
        check: [ cli-svg, cli-xml, template, gradle-plugin ]
        exclude:
          - os: macos-latest
            check: gradle-plugin
          - os: windows-latest
            check: gradle-plugin
    runs-on: ${{ matrix.os }}
    steps:
        - name: Checkout the repo
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

        - name: Prepares environment for building
          uses: ./.github/actions/setup

        - name: Prepare nodeJS environment for integrity check
          uses: ./.github/actions/setup-nodejs
          with:
            os: ${{ matrix.os }}

        - name: Download native binary
          if: matrix.check != 'gradle-plugin'
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
            name: native-binary-${{ matrix.os }}
            path: modules/cli/build/bin/

        - name: Restore binary permissions
          if: matrix.check != 'gradle-plugin' && matrix.os != 'windows-latest'
          shell: bash
          run: chmod +x modules/cli/build/bin/*/releaseExecutable/s2c.*

        - name: CLI Integrity check using SVG
          if: matrix.check == 'cli-svg'
          uses: ./.github/actions/cli-integrity-check
          with:
            type: svg

        - name: CLI Integrity check using XML
          if: matrix.check == 'cli-xml'
          uses: ./.github/actions/cli-integrity-check
          with:
            type: xml

        - name: Template Integrity check
          if: matrix.check == 'template'
          uses: ./.github/actions/template-integrity-check

        - name: Gradle Plugin Integrity check
          if: matrix.check == 'gradle-plugin'
          uses: ./.github/actions/gradle-plugin-integrity-check
