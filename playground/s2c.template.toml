# SVG-to-Compose template configuration.
# See docs/TEMPLATES.md for the full schema reference.

# --- Definitions ---
# Receiver type for the generated icon property (auto-imported).
[definitions.receiver]
name = "Icons"
package = "dev.tonholo.svg_to_compose.playground.ui.icon.template"

# Keyed imports referenced in templates via ${def:<key>}.
# The simple name (last segment) is emitted; the full path is auto-imported.
[definitions.imports]
icon_builder = "dev.tonholo.svg_to_compose.playground.ui.icon.template.icon"
icon_path = "dev.tonholo.svg_to_compose.playground.ui.icon.template.iconPath"
theme = "dev.tonholo.svg_to_compose.playground.ui.theme.SampleAppTheme"

# Color mappings: replace Color(<value>) with <name> and auto-import <import>.<name>.
[[definitions.color_mapping]]
name = "BLACK"
import = "dev.tonholo.svg_to_compose.playground.ui.icon.template"
value = "0xFF121212"

# --- Templates ---
# icon_template: the outer icon property. Placeholders: ${icon:*}, ${template:*}.
[templates]
icon_template = """
${icon:visibility} val ${icon:property_name}: ImageVector by lazy {
    ${template:icon_builder} {
        ${icon:body}
    }
}
"""

# preview: custom @Preview function. Set template = "" to suppress preview.
[templates.preview]
template = """
@Preview(name = "${icon:name}", showBackground = true)
@Composable
private fun ${icon:name}Preview() {
    ${def:theme} {
        Image(
            imageVector = ${icon:property_name},
            contentDescription = null,
        )
    }
}
"""

# --- Fragments ---
# Named template snippets referenced via ${template:<name>}.
# path_builder / group_builder: per-node fragments. The body/commands block
# is always appended by the emitter; do NOT include ${path:commands} or
# ${group:body} in these fragments. Null parameters are automatically trimmed.
[fragments]
icon_builder = "${def:icon_builder}(name = \"${icon:name}\", viewportWidth = ${icon:viewport_width}, viewportHeight = ${icon:viewport_height})"
path_builder = "${def:icon_path}(fill = ${path:fill}, fillAlpha = ${path:fill_alpha}, strokeAlpha = ${path:stroke_alpha}, pathFillType = ${path:fill_type})"
group_builder = "group(rotate = ${group:rotate}, pivotX = ${group:pivot_x}, pivotY = ${group:pivot_y})"
# chunk_function_name / chunk_function_definition: customize how large icons
# are split into helper functions. ${icon:name} is camelCase, ${chunk:index}
# is the 0-based chunk number, ${chunk:name} is the resolved function name,
# and ${chunk:body} is the emitted node code for the chunk.
chunk_function_name = "${icon:name}Part${chunk:index}"
chunk_function_definition = "private fun ImageVector.Builder.${chunk:name}() {\n${chunk:body}\n}"
